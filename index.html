<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header & Footer */
        .gallery-header, .gallery-footer {
            text-align: center;
            padding: 30px 20px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .gallery-header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .gallery-footer {
            margin-top: auto;
            font-size: 0.9rem;
            color: #888;
        }

        /* Gallery Grid */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 50px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .gallery-item {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            background-color: #2a2a2a;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        /* Music Button - تم تعديل لونه لبرتقالي عشان يكون واضح جداً */
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #ff9800; /* لون برتقالي واضح */
            color: #000000;
            border: 2px solid #ffffff;
            padding: 15px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 9999; /* عشان يكون فوق أي حاجة في الصفحة */
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.5);
        }

        .music-btn:hover {
            transform: scale(1.1);
        }

        /* Lightbox Overlay */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .lightbox.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            object-fit: contain;
        }

        /* Controls */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
            transition: color 0.2s ease;
            z-index: 1001;
        }

        .close-btn:hover {
            color: #ff4d4d;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            font-size: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .prev-btn {
            left: 20px;
        }

        .next-btn {
            right: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .gallery-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
                padding: 30px 15px;
            }
        }
    </style>
</head>
<body>

    <header class="gallery-header">
        <h1>Image Gallery</h1>
    </header>

    <main class="gallery-container">
        <!-- الصور جوه فولدر JPG -->
        <img src="JPG/1.jpg" alt="Gallery Image 1" class="gallery-item" data-index="0">
        <img src="JPG/2.jpg" alt="Gallery Image 2" class="gallery-item" data-index="1">
        <img src="JPG/3.jpg" alt="Gallery Image 3" class="gallery-item" data-index="2">
        <img src="JPG/4.jpg" alt="Gallery Image 4" class="gallery-item" data-index="3">
        <img src="JPG/5.jpg" alt="Gallery Image 5" class="gallery-item" data-index="4">
    </main>

    <footer class="gallery-footer">
        <p>&copy; 2026 Image Gallery. All rights reserved.</p>
    </footer>

    <!-- Audio Element -->
    <audio id="bg-music" loop>
        <source src="Albumaty.Com_mnwaat_Dai_Dai.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Control Button -->
    <button id="music-toggle" class="music-btn">
        <span id="music-icon">🎵</span> <span id="music-text">Play Music</span>
    </button>

    <!-- Fullscreen Lightbox -->
    <div id="lightbox" class="lightbox hidden">
        <span class="close-btn">&times;</span>
        <button class="nav-btn prev-btn">&lt;</button>
        <img id="lightbox-img" src="" alt="Fullscreen Image">
        <button class="nav-btn next-btn">&gt;</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // ==================== Music Player Logic ====================
            const bgMusic = document.getElementById('bg-music');
            const musicToggleBtn = document.getElementById('music-toggle');
            const musicIcon = document.getElementById('music-icon');
            const musicText = document.getElementById('music-text');
            let isPlaying = false;

            musicToggleBtn.addEventListener('click', () => {
                if (isPlaying) {
                    bgMusic.pause();
                    musicIcon.textContent = '🎵';
                    musicText.textContent = 'Play Music';
                } else {
                    bgMusic.play();
                    musicIcon.textContent = '⏸️';
                    musicText.textContent = 'Pause Music';
                }
                isPlaying = !isPlaying;
            });

            // ==================== Gallery Logic ====================
            const images = ['JPG/1.jpg', 'JPG/2.jpg', 'JPG/3.jpg', 'JPG/4.jpg', 'JPG/5.jpg'];
            let currentIndex = 0;

            const galleryItems = document.querySelectorAll('.gallery-item');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.querySelector('.close-btn');
            const prevBtn = document.querySelector('.prev-btn');
            const nextBtn = document.querySelector('.next-btn');

            // Open Lightbox
            galleryItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    currentIndex = parseInt(e.target.getAttribute('data-index'), 10);
                    updateLightboxImage();
                    lightbox.classList.remove('hidden');
                });
            });

            // Close Lightbox
            const closeLightbox = () => {
                lightbox.classList.add('hidden');
            };

            closeBtn.addEventListener('click', closeLightbox);

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            // Navigation
            const showPrevImage = () => {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                updateLightboxImage();
            };

            const showNextImage = () => {
                currentIndex = (currentIndex + 1) % images.length;
                updateLightboxImage();
            };

            prevBtn.addEventListener('click', showPrevImage);
            nextBtn.addEventListener('click', showNextImage);

            const updateLightboxImage = () => {
                lightboxImg.src = images[currentIndex];
            };

            // Keyboard Shortcuts (Esc, Left Arrow, Right Arrow)
            document.addEventListener('keydown', (e) => {
                if (lightbox.classList.contains('hidden')) return;
                
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') showPrevImage();
                if (e.key === 'ArrowRight') showNextImage();
            });
        });
    </script>
</body>
</html>
